<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Temperature Matrix View</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        /* Matrix cell borders */
        .cell {
            stroke: #fff;
            stroke-width: 1px;
            cursor: pointer;
        }
        /* Axis line and tick styles */
        .axis line, .axis path {
            stroke: #000;
            stroke-width: 1px;
        }
        .axis text {
            fill: #000;
        }
        /* Tooltip styling */
        .tooltip {
            position: absolute;
            text-align: left;
            padding: 8px;
            font: 12px sans-serif;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
            z-index: 10;
        }
        /* MAX temperature daily line color */
        .line-max {
            fill: none;
            stroke: #64A33D;
            stroke-width: 1.5px;
            opacity: 1.0;
        }
        /* MIN temperature daily line color */
        .line-min {
            fill: none;
            stroke: #7C3DA3;
            stroke-width: 1.5px;
            opacity: 1.0;
        }
        .interactive-rect {
            fill: transparent;
            cursor: pointer;
        }
        .legend text {
            font-size: 12px;
        }
    </style>
</head>
